name: Deploy to Hugging Face Space

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  deploy-space:
    runs-on: ubuntu-latest
    env:
      # Hugging Face access token, stored as a GitHub secret
      HF_TOKEN: ${{ secrets.Peacock_Detection_with_YOLO }}
      # Change this to your actual HF username/space name
      HF_SPACE_ID: mr-sachin/Peacock_Detection_with_YOLO

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Hugging Face Hub client
        run: |
          python -m pip install --upgrade pip
          pip install huggingface_hub

      - name: Sync repo to Hugging Face Space
        env:
          HF_TOKEN: ${{ env.HF_TOKEN }}
          HF_SPACE_ID: ${{ env.HF_SPACE_ID }}
        run: |
          python - << 'PY'
          import os
          from huggingface_hub import HfApi

          token = os.environ["HF_TOKEN"]
          space_id = os.environ["HF_SPACE_ID"]

          api = HfApi(token=token)

          # Create the Space if it doesn't exist (Docker SDK since we have a Dockerfile)
          api.create_repo(
              repo_id=space_id,
              repo_type="space",
              space_sdk="docker",
              exist_ok=True,
          )

          # Upload the entire repo (current directory) to the Space
          api.upload_folder(
              folder_path=".",
              repo_id=space_id,
              repo_type="space",
              commit_message="Sync from GitHub"
          )
          PY
